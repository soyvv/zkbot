name: zk-dev

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "zk-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zk
      POSTGRES_PASSWORD: zk
      POSTGRES_DB: zkbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zk -d zkbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: zk_events
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev"]
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-gw:
    build:
      context: ..
      dockerfile: devops/Dockerfile.mock-gw
    image: zk-mock-gw:dev
    ports:
      - "51051:51051"
    environment:
      ZK_NATS_URL: "nats://nats:4222"
      ZK_GW_ID: "gw_mock_1"
      ZK_ACCOUNT_ID: "9001"
      ZK_FILL_DELAY_MS: "100"
      ZK_MOCK_BALANCES: "BTC:10,USDT:100000,ETH:50"
      RUST_LOG: "zk_mock_gw=info,warn"
    depends_on:
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:

name: zk-dev

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "zk-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zk
      POSTGRES_PASSWORD: zk
      POSTGRES_DB: zkbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zk -d zkbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: zk_events
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev"]
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 5

  gw-sim:
    build:
      context: ..
      dockerfile: devops/Dockerfile.gw-sim
    image: zk-gw-sim:dev
    ports:
      - "51051:51051"
      - "51052:51052"
    environment:
      ZK_NATS_URL: "nats://nats:4222"
      ZK_GW_ID: "gw_sim_1"
      ZK_VENUE: "simulator"
      ZK_ACCOUNT_ID: "9001"
      ZK_MATCH_POLICY: "fcfs"
      ZK_MOCK_BALANCES: "BTC:10,USDT:100000,ETH:50"
      ZK_GRPC_PORT: "51051"
      ZK_ADMIN_GRPC_PORT: "51052"
      ZK_ENABLE_ADMIN_CONTROLS: "true"
      RUST_LOG: "zk_gw_svc=info,warn"
    depends_on:
      nats:
        condition: service_healthy

  rtmd-sim-gw:
    build:
      context: ..
      dockerfile: devops/Dockerfile.rtmd-sim-gw
    environment:
      ZK_NATS_URL: nats://nats:4222
      ZK_MDGW_ID: mdgw_sim_1
      ZK_VENUE: simulator
      ZK_GRPC_PORT: 52051
      RUST_LOG: zk_rtmd_gw_svc=info,warn
    ports:
      - "52051:52051"
    depends_on:
      nats:
        condition: service_healthy

  pilot:
    profiles: ["full"]   # started by 'make dev-up-full'; run locally with 'uv run python -m zk_pilot.main'
    build:
      context: ..
      dockerfile: devops/Dockerfile.pilot
    image: zk-pilot:dev
    ports:
      - "8090:8090"     # admin HTTP API
    environment:
      ZK_NATS_URL: "nats://nats:4222"
      ZK_PG_URL: "postgres://zk:zk@postgres:5432/zkbot"
      ZK_ENV: "dev"
      ZK_PILOT_ID: "pilot_dev_1"
      ZK_HTTP_PORT: "8090"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  oms-svc:
    profiles: ["full"]   # not started by default; use 'make dev-up-full' or 'docker compose --profile full up'
    build:
      context: ..
      dockerfile: devops/Dockerfile.oms-svc
    image: zk-oms-svc:dev
    ports:
      - "50051:50051"
    environment:
      ZK_OMS_ID: "oms_dev_1"
      ZK_NATS_URL: "nats://nats:4222"
      ZK_REDIS_URL: "redis://redis:6379"
      ZK_PG_URL: "postgres://zk:zk@postgres:5432/zkbot"
      ZK_GRPC_PORT: "50051"
      ZK_GATEWAY_KV_PREFIX: "svc.gw"
      ZK_RISK_CHECK_ENABLED: "false"
      RUST_LOG: "zk_oms_svc=info,warn"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gw-sim:
        condition: service_started

  pilot-java:
    profiles: ["java"]   # started by 'make pilot-java-run' or 'docker compose --profile java up'
    build:
      context: ..
      dockerfile: devops/Dockerfile.pilot-java
    image: zk-pilot-java:dev
    ports:
      - "8091:8090"     # 8091 to avoid conflict with Python pilot on 8090
    environment:
      ZK_NATS_URL: "nats://nats:4222"
      ZK_PG_URL: "jdbc:postgresql://postgres:5432/zkbot"
      ZK_PG_USER: "zk"
      ZK_PG_PASS: "zk"
      ZK_REDIS_URL: "redis://redis:6379"
      ZK_ENV: "dev"
      ZK_PILOT_ID: "pilot_dev_1"
      ZK_HTTP_PORT: "8090"
      SPRING_PROFILES_ACTIVE: "dev"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  refdata-svc:
    build:
      context: ..
      dockerfile: devops/Dockerfile.refdata-svc
    image: zk-refdata-svc:dev
    ports:
      - "50052:50052"
    environment:
      ZK_NATS_URL:            "nats://nats:4222"
      ZK_PG_URL:              "postgres://zk:zk@postgres:5432/zkbot"
      ZK_REFDATA_LOGICAL_ID:  "refdata_dev_1"
      ZK_REFDATA_GRPC_PORT:   "50052"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data:

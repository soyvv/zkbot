schema_id: svc/engine
version: 1
config_schema: schemas/engine_config.schema.json
field_descriptors:
  # Current engine service consumes only these provided-config fields.
  # Bootstrap-owned fields such as nats_url, grpc_host, grpc_port,
  # discovery_bucket, env, engine_id, and bootstrap_token are not part of
  # the Pilot-managed engine schema.
  #
  # Note: the current engine runtime does not implement config hot-reload.
  # Even timer/kline settings are effectively restart-required today.
  - path: /strategy_type_key
    reloadable: false
  - path: /account_ids
    reloadable: false
  - path: /instruments
    reloadable: false
  - path: /timer_interval_ms
    reloadable: false
  - path: /kline_interval
    reloadable: false

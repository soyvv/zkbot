
syntax = "proto3";
import "common.proto";
import "oms.proto";


package tqrpc_oms;

enum OMSErrorType {
    OMS_ERR_TYPE_UNSPECIFIED = 0;
    OMS_ERR_TYPE_INVALID_REQ = 2;
    OMS_ERR_TYPE_REQUEST_REJECTED = 3;
    OMS_ERR_TYPE_LIMIT_EXCEEDED = 4;
    OMS_ERR_TYPE_INTERNAL_ERROR = 5;
}

message OMSResponse {
    enum Status {
        OMS_RESP_STATUS_UNSPECIFIED = 0;
        OMS_RESP_STATUS_SUCCESS = 1;
        OMS_RESP_STATUS_FAIL = 2;
    }
    int64 timestamp = 1;
    Status status = 2;
    OMSErrorType error_type = 3;
    string message = 4;
}


message OMSPlaceOrderRequest {
    oms.OrderRequest order_request = 1;
}

message OMSCancelOrderRequest {
    oms.OrderCancelRequest order_cancel_request = 1;
}

message OMSBatchPlaceOrdersRequest {
    repeated oms.OrderRequest order_requests = 1;
}

message OMSBatchCancelOrdersRequest {
    repeated oms.OrderCancelRequest order_cancel_requests = 1;
}


message OMSAlgoOrderRequest {
    int64 algo_order_id = 1;
    repeated oms.OrderRequest order_requests = 2;
    string algo_type = 3;
    string algo_config = 4;
    // TBA
}


message OMSCancelAlgoOrderRequest {
    int64 algo_order_id = 1;
}


message OMSReloadConfRequest {
    // todo: TBA
}


message OMSQueryAccountRequest {
    int64 account_id = 1;
    bool query_gw = 2;  // query gw for most up-to-date data
}

message OMSAccountBalanceEntry {
    string symbol = 1;
    double avail = 2;
    double frozen = 3;
}
message OMSAccountResponse {
    int64 account_id = 1;
    repeated oms.Position account_balance_entries = 2;
    int64 timestamp = 3;
}


message OMSQueryPositionRequest {
    int64 account_id = 1;
    bool query_gw = 2;  // query gw for most up-to-date data
}


message OMSPositionResponse {
    repeated oms.Position positions = 1;
}


message OMSQueryOpenOrderRequest {
    int64 account_id = 1;
    bool query_gw = 2;  // query gw for most up-to-date data
}

message OMSQueryOrderDetailRequest {
    repeated string order_refs = 1;
    bool query_gw = 2;  // query gw for most up-to-date data
}


message OMSOrderDetailResponse {
    repeated oms.Order orders = 1;
}


message OMSQeuryTradeDetailRequest {
    repeated string order_refs = 1;
    // todo: other criteria?
    bool query_gw = 2;  // query gw for most up-to-date data
}


message OMSTradeDetailResponse {
    repeated oms.Trade trades = 1;
}


message PanicRequest {
    int64 panic_account_id = 1;
    string panic_message = 2;
    string panic_source = 3;
}

message DontPanicRequest {
    int64 panic_account_id = 1;
}

message OMSQueryInstrumentRefdataRequest {
    int64 account_id = 1;
    repeated string instruments = 2;
}

message OMSQueryInstrumentRefdataResponse {
    repeated common.InstrumentRefData instrument_refdata = 1;
}

service OrderManagerService {
    rpc PlaceOrder(OMSPlaceOrderRequest) returns (OMSResponse);
    rpc BatchPlaceOrders(OMSBatchPlaceOrdersRequest) returns (OMSResponse);
    rpc CancelOrder(OMSCancelOrderRequest) returns (OMSResponse);
    rpc BatchCancelOrders(OMSBatchCancelOrdersRequest) returns (OMSResponse);
    rpc ExecuteAlgoOrder(OMSAlgoOrderRequest) returns (OMSResponse);
    rpc CancelAlgoOrder(OMSCancelAlgoOrderRequest) returns (OMSResponse);
    rpc ReloadConfig(OMSReloadConfRequest) returns (OMSResponse);

    rpc Panic(PanicRequest) returns (OMSResponse);
    rpc DontPanic(DontPanicRequest) returns (OMSResponse);

    rpc QueryAccountBalance(OMSQueryAccountRequest) returns (OMSAccountResponse);
    rpc QueryPosition(OMSQueryPositionRequest) returns (OMSPositionResponse);
    rpc QueryOpenOrders(OMSQueryOpenOrderRequest) returns (OMSOrderDetailResponse);
    rpc QueryOrderDetails(OMSQueryOrderDetailRequest) returns (OMSOrderDetailResponse);
    rpc QueryTradeDetails(OMSQeuryTradeDetailRequest) returns (OMSTradeDetailResponse);
}
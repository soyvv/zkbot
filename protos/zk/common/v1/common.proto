// ===== Messages (migrated from common.proto, field numbers preserved) =====

message InstrumentRefData {
    string instrument_id = 1;
    string instrument_id_exchange = 2;
    int64 update_ts = 3;
    string exchange_name = 5;
    InstrumentType instrument_type = 6;
    string base_asset = 7;
    string quote_asset = 8;
    string settlement_asset = 9;
    double contract_size = 10;
    int64 price_precision = 11;
    int64 qty_precision = 12;
    double price_tick_size = 13;
    double qty_lot_size = 14;
    double min_notional = 15;
    double max_notional = 16;
    double min_price = 17;
    double max_price = 18;
    double min_order_qty = 19;
    double max_order_qty = 20;
    map<string, string> extra_properties = 21;
    string original_info = 22;
    bool disabled = 23;
    double max_mkt_order_qty = 24;
    string expiry_date = 25;
    string currency = 26;
    string isin = 27;
    string listing_exchange = 28;
    double margin_requirement = 29;
    string asset_class = 30;
}

message ExtraData {
    map<string, string> data_map = 1;
}

message DummyRequest {}

message OrderEventMessage {
    int64 timestamp = 1;
    string source_id = 2;
    int64 order_id = 3;
    string exch_order_ref = 4;
    EventLogLevelType event_loglevel_type = 5;
    EventSourceType source_type = 6;
    EventType event_type = 7;
    string message = 8;
}

message LatencyMetric {
    map<string, int64> tagged_timestamps = 1;  // tag → nanoseconds
    int64  order_id  = 2;  // order this metric belongs to
    string source_id = 3;  // publisher id (e.g. "oms_dev_1")
}

// Batch of LatencyMetric messages published periodically by services.
// NATS subject: zk.{svc}.{svc_id}.metrics.latency
message LatencyMetricBatch {
    repeated LatencyMetric metrics       = 1;
    string                 publisher_id  = 2;
    int64                  publish_ts_ns = 3;
}

message Rejection {
    RejectionSource source = 1;
    bool recoverable = 2;
    RejectionReason reason = 3;
    int64 error_code = 4;
    string error_message = 5;
}

message MarginPositionInfo {
    double leverage = 1;
    double entry_price = 2;
    double mark_price = 3;
    double liquidation_price = 4;
    double margin = 5;
    double contracts = 6;
    double contract_size = 7;
    double contract_value = 8;
    double index_price = 9;
    double unsettled_pnl = 10;
    double last_trade_price = 11;
    int64 update_ts = 12;
}

// ===== New messages (zk.common.v1 additions) =====

message ErrorStatus {
    int32  code    = 1;
    string message = 2;
    string detail  = 3;
}

message CommandAck {
    bool        success         = 1;
    ErrorStatus error           = 2;
    string      request_id      = 3;
    string      idempotency_key = 4;
}

message LifecycleAck {
    bool        success    = 1;
    ErrorStatus error      = 2;
    string      request_id = 3;
}

message AuditMeta {
    string source_id    = 1;
    string request_id   = 2;
    string trace_id     = 3;
    int64  timestamp_ms = 4;
}

message PaginationRequest {
    int32  page_size = 1;
    string cursor    = 2;
}

message PaginationResponse {
    string next_cursor  = 1;
    bool   has_more     = 2;
    int32  total_count  = 3;
}

message ServiceHealthResponse {
    string service_id = 1;
    string status     = 2;
    string detail     = 3;
    int64  uptime_ms  = 4;
}

message ControlCommand {
    string command = 1;
    string target  = 2;
    map<string, string> params = 3;
}

message PostTradeEvent {
    int64  order_id    = 1;
    int64  account_id  = 2;
    string oms_id      = 3;
    string gw_id       = 4;
    int64  timestamp_ms = 5;
    map<string, string> meta = 6;
}

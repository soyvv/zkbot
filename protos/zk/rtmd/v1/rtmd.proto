syntax = "proto3";
package zk.rtmd.v1;

// ===== Enums (from rtmd.proto, values preserved) =====

enum TickUpdateType {
    TICK_TYPE_UNSPECIFIED = 0;
    OB = 1;
    T  = 2;
    M  = 3;
}

// ===== Messages (from rtmd.proto, field numbers preserved) =====

message PriceLevel {
    double price = 1;
    double qty = 2;
    int64 numOfOrders = 3;
    int64 numOfPos = 4;
}

message Trade {
    double price = 1;
    double qty = 2;
    int64 timestamp = 3;
    string side = 4;
    string instrument_code = 5;
}

message TickData {
    TickUpdateType tick_type = 1;
    string instrument_code = 2;
    string exchange = 3;
    int64 original_timestamp = 4;
    int64 received_timestamp = 5;
    double volume = 7;
    double latest_trade_price = 8;
    double latest_trade_qty = 9;
    string latest_trade_side = 10;
    repeated PriceLevel buy_price_levels = 14;
    repeated PriceLevel sell_price_levels = 15;
}

message Kline {
    enum KlineType {
        KLINE_1MIN  = 0;
        KLINE_5MIN  = 1;
        KLINE_15MIN = 2;
        KLINE_30MIN = 3;
        KLINE_1HOUR = 4;
        KLINE_4HOUR = 5;
        KLINE_1DAY  = 6;
    }
    int64 timestamp = 1;
    int64 kline_end_timestamp = 2;
    double open = 3;
    double high = 4;
    double close = 5;
    double low = 6;
    double volume = 7;
    double amount = 8;
    KlineType kline_type = 9;
    string symbol = 10;
    string source = 11;
}

message FundingRate {
    string instrument_code = 1;
    string exchange = 2;
    int64 curr_funding_rate_timestamp = 3;
    double funding_rate = 4;
    double mark_price = 6;
    double index_price = 7;
    double next_funding_rate = 10;
    int64 observe_timestamp = 12;
    int64 next_funding_rate_timestamp = 13;
    string original_message = 14;
    int64 next_payment_timestamp = 15;
}

message RealtimeSignal {
    string namespace = 1;
    string instrument = 2;
    int64 timestamp = 3;
    map<string, double> data = 4;
    string message = 5;
    map<string, int64> data_int = 6;
    map<string, string> data_str = 7;
}

// ===== New messages (zk.rtmd.v1 additions) =====

message OrderBook {
    string instrument_code = 1;
    string exchange = 2;
    int64  timestamp_ms = 3;
    repeated PriceLevel buy_levels = 4;
    repeated PriceLevel sell_levels = 5;
}

syntax = "proto3";
package zk.strategy.v1;

import "zk/common/v1/common.proto";

// ===== Enums (from strategy.proto, values preserved) =====

enum StrategyCommandType {
    STRAT_CMD_UNSPECIFIED = 0;
    STRAT_CMD_REINIT = 1;
    STRAT_CMD_PAUSE = 2;
    STRAT_SPECIFIC_CMD = 3;
}

enum StrategyStatusType {
    STRAT_STATUS_UNSPECIFIED = 0;
    STRAT_STATUS_INITIALIZING = 1;
    STRAT_STATUS_RUNNING = 2;
    STRAT_STATUS_STOPPED = 3;
    STRAT_STATUS_ERROR = 4;
    STRAT_STATUS_EXCEPTIONED = 5;
}

// ===== New enums (zk.strategy.v1 additions) =====

enum StrategyLifecycleState {
    LIFECYCLE_UNSPECIFIED = 0;
    INITIALIZING          = 1;
    RUNNING               = 2;
    PAUSED                = 3;
    STOPPED               = 4;
    ERROR                 = 5;
}

enum StrategyRuntimeType {
    RUNTIME_UNSPECIFIED = 0;
    RUNTIME_RUST        = 1;
    RUNTIME_PY_EMBEDDED = 2;
    RUNTIME_PY_WORKER   = 3;
}

enum LogLevel {
    LOG_UNSPECIFIED = 0;
    LOG_TRACE       = 1;
    LOG_DEBUG       = 2;
    LOG_INFO        = 3;
    LOG_WARN        = 4;
    LOG_ERROR       = 5;
}

// ===== Messages (from strategy.proto, field numbers preserved) =====

message Strategy {
    string strategy_key = 1;
    string strategy_desc = 2;
    string strategy_script_file_name = 3;
    repeated int64 account_ids = 4;
    repeated string symbols = 5;
    string config = 6;
    string oms_config = 7;
    string current_execution_id = 8;
}

message StrategyExecution {
    int64 start_ts = 1;
    int64 end_ts = 2;
    string strategy_key = 3;
    string execution_id = 4;
    string config = 6;
}

message StrategyCommand {
    StrategyCommandType cmd_type = 1;
    string source_id = 2;
    string strategy_key = 3;
    string execution_id = 4;
    string cmd_data = 5;
}

message StrategyConfig {
    // TBA
}

message StrategyLifecycleNotifyEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    StrategyStatusType status = 4;
    string payload_json = 5;
}

message StrategyOrderEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    int64 order_id = 5;
    double price = 6;
    double qty = 7;
    string symbol = 8;
    int64 account_id = 9;
    zk.common.v1.BuySellType buy_sell = 10;
}

message StrategyCancelEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    int64 order_id = 4;
    string exch_order_id = 5;
}

message StrategyLogEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    string log = 4;
    string log_type = 5;
}

message StrategyNotification {
    int64 timestamp = 1;
    string strategy_key = 2;
    string execution_id = 3;
    string message = 4;
    map<string, string> message_meta_info = 5;
}

// ===== New messages (zk.strategy.v1 additions) =====

message StrategyStructuredLogEvent {
    string   strategy_id  = 1;
    string   execution_id = 2;
    LogLevel level        = 3;
    string   message      = 4;
    int64    timestamp_ms = 5;
    map<string, string> meta = 6;
}

message StrategyAlert {
    string severity   = 1;  // INFO | WARN | CRITICAL
    string channel    = 2;
    string message    = 3;
    map<string, string> payload = 4;
}

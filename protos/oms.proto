syntax = "proto3";

import "common.proto";

package oms;

enum OrderStatus {
    ORDER_STATUS_UNSPECIFIED = 0;
    ORDER_STATUS_PENDING = 1;
    ORDER_STATUS_BOOKED = 2; // reach to exchange
    ORDER_STATUS_PARTIALLY_FILLED = 3;
    ORDER_STATUS_FILLED = 4;
    ORDER_STATUS_CANCELLED = 5;
    ORDER_STATUS_REJECTED = 6;
}

enum ExecType {
    EXEC_TYPE_UNSPECIFIED = 0;
    EXEC_TYPE_CANCEL = 1;
    EXEC_TYPE_PLACING_ORDER = 2;
}



message Account {
    int64 account_id = 1;
    string account_code = 2; // internal code
    string exch_account_code = 3; // access/address
    
    // string accountDesc = 4;

    common.ExtraData per_account_setting = 4;
}


message OrderRequest {
    int64 order_id = 1;  // client generated unique order id
    int64 account_id = 2;
    string instrument_code = 3; // internal code
    common.BuySellType buy_sell_type= 4;
    common.OpenCloseType open_close_type = 5;
    common.BasicOrderType order_type = 6;
    common.TimeInForceType time_inforce_type = 13;
    repeated common.ExtraOrderTagType extra_order_tags = 14;
    double price = 7;
    double qty = 8;
    string source_id = 9;
    int64 timestamp = 10;

    double leverage = 11;

    common.ExtraData extra_properties = 12;
}


message OrderCancelRequest {
    int64 order_id = 1;
    string exch_order_ref = 2; // required 
    common.ExtraData extra_info_required = 3;

    string sourceId = 7;
    int64 timestamp = 8;
}



message Order {
    int64 order_id = 1;
    string exch_order_ref = 2;
    string gw_key = 16;
    int64 account_id = 18;

    // greater version number means more up-to-date snapshot
    // any order processor should discard order snapshot 
    // with smaller version than currently held version
    int32 snapshot_version = 3;

    OrderStatus order_status = 15;

    string instrument = 4;
    string instrument_exch =  17;
    common.BuySellType buy_sell_type= 5;
    common.OpenCloseType open_close_type = 6;
    double price = 7;
    double qty = 8;

    double filled_qty = 9;
    double filled_avg_price = 10;
    string error_msg = 11;

    string source_id = 12;
    int64 created_at = 13;
    int64 updated_at = 14;
    

}


message Fee {
    int64 order_id = 1;
    string fee_symbol = 2;
    double fee_amount = 3;
    common.FeeType fee_type = 4;
    int64 fee_ts = 5;
}


message Trade {
    int64 order_id = 1;
    string ext_order_ref = 2;
    string ext_trade_id = 3;

    double filled_qty = 4;
    double filled_price = 5;

    int64 filled_ts = 6;

    common.BuySellType buy_sell_type = 7;
    common.FillType fill_type = 10;
    string instrument = 8;
    int64 account_id = 9;

    repeated Fee fees = 11;

    double exch_pnl = 12;
}

// exec message is used to deliver operation result (by default failure only)
// such as: order cancel (failure); order replace (failure) etc.
message ExecMessage {
    int64 order_id = 1;
    string exch_order_ref = 2;
    int64 timestamp = 3;
    ExecType exec_type = 4;
    bool exec_success = 5;
    string error_msg = 6;

    common.Rejection rejection_info = 7;
}


message Position {
    int64 account_id = 1;
    string instrument_code = 2;
    common.LongShortType long_short_type = 3;

    common.InstrumentType instrument_type = 4;

    double total_qty = 5;
    double frozen_qty = 6;
    double avail_qty = 7;

    double contract_size = 12;
    bool contract_size_adjusted = 14;

    common.MarginPositionInfo margin_pos_info = 13;

    int64 sync_timestamp = 8;
    int64 update_timestamp = 9;

    bool is_from_exch = 10;
    string exch_data_raw = 11;
}



message OrderUpdateEvent {
    int64 order_id = 1;
    int64 account_id = 2;
    Order order_snapshot = 3;
    Trade order_inferred_trade = 9;
    Trade last_trade = 4;
    Fee last_fee = 5;
    ExecMessage exec_message = 6;
    int64 timestamp = 7;
    string order_source_id = 8;
}



message PositionUpdateEvent {
    int64 account_id = 1;
    repeated Position position_snapshots = 2;
    int64 timestamp = 4;
}


message OMSSystemEvent {
    int64 timestamp = 1;
    string oms_id = 2;
    string event_type = 3;
    string event_message = 4;
}
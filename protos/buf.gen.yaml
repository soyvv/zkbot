version: v2
managed:
  enabled: true

# Python pb2/grpc and Python BetterProto are driven by scripts/gen_proto.py
# (grpc_tools.protoc + BetterProto plugin) — not by buf.
# Java is generated at build time by the Gradle `com.google.protobuf` plugin
# in java/zk-proto-java/ — not committed, not driven by buf.
# buf handles Rust only.

plugins:
  # --- Rust: prost ---
  - remote: buf.build/community/neoeinstein-prost
    out: ../rust/crates/zk-proto-rs/src
    opt:
        - compile_well_known_types=true
        - bytes=bytes

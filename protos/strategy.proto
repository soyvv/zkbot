//    STRAT_ACTION_TYPE_LOG = 4;
//    STRAT_ACTION_TYPE_CONFIG_NOTIFY = 5;
//    STRAT_ACTION_TYPE_EXPORT = 6;
//}


enum StrategyStatusType {
    STRAT_STATUS_UNSPECIFIED = 0;
    STRAT_STATUS_INITIALIZING = 1; // running init stuff
    STRAT_STATUS_RUNNING = 2; // running and reacting to ext events
    STRAT_STATUS_STOPPED = 3; // stopped by user
    STRAT_STATUS_ERROR = 4; // strategy self-marked as error
    STRAT_STATUS_EXCEPTIONED = 5; // unexpected exception
}


message StrategyConfig {
    // TBA
}

message StrategyLifecycleNotifyEvent{
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    StrategyStatusType status = 4;
    string payload_json = 5;
}

message StrategyOrderEvent{
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    //tqrpc_oms.OMSPlaceOrderRequest order_request = 4;
    //string order_request_json = 4
    int64 order_id = 5;
    double price = 6;
    double qty = 7;
    string symbol = 8;
    int64 account_id = 9;
    common.BuySellType buy_sell = 10;

}

message StrategyCancelEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    int64 order_id = 4;
    string exch_order_id = 5;
}

message StrategyLogEvent {
    int64 timestamp = 1;
    string strategy_id = 2;
    string execution_id = 3;
    string log = 4;
    string log_type = 5; // INFO/DEBUG/ERROR etc
}


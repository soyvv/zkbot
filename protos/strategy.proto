syntax="proto3";

import "common.proto";
import "rpc-oms.proto";

package strategy;


message Strategy {
    string strategy_key = 1;
    string strategy_desc = 2;
    string strategy_script_file_name = 3;
    repeated int64 account_ids = 4;
    repeated string symbols = 5;

    string config = 6;
    string oms_config = 7; // OMS config json string

    string current_execution_id = 8; // None if not running
}


message StrategyExecution {
    int64 start_ts = 1;
    int64 end_ts = 2;  // None if not ended

    string strategy_key = 3;
    string execution_id = 4;

    string config = 6;
}


enum StrategyCommandType {
    STRAT_CMD_UNSPECIFIED = 0;
    STRAT_CMD_REINIT = 1;
    STRAT_CMD_PAUSE = 2;
    STRAT_SPECIFIC_CMD = 3;
}

message StrategyCommand {
    StrategyCommandType cmd_type = 1;
    string source_id = 2;
    string strategy_key = 3;
    string execution_id = 4;
    string cmd_data = 5;
}


//enum StrategyActionType {
//    STRAT_ACTION_TYPE_UNSPECIFIED = 0;
//    STRAT_ACTION_TYPE_LIFECYCLE_NOTFIY = 1;
//    STRAT_ACTION_TYPE_ORDER = 2;

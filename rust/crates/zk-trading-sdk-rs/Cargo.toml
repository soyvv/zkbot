[package]
name = "zk-trading-sdk-rs"
version = "0.1.0"
edition = "2021"
description = "ZKBot trading client SDK — replaces TQClient, ODS-free"

[lib]
name = "zk_trading_sdk_rs"
path = "src/lib.rs"

[dependencies]
# async runtime
tokio = { version = "1", features = ["full"] }

# gRPC
tonic = "0.12"
prost = "0.13"

# NATS
async-nats = "0.37"

# serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# futures
futures = "0.3"

# byte buffers
bytes = "1"

# tracing
tracing = "0.1"

# errors
thiserror = "2"
anyhow = "1"

# async trait objects
async-trait = "0.1"

# infra + proto
zk-infra-rs  = { path = "../zk-infra-rs" }
zk-proto-rs  = { path = "../zk-proto-rs" }

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

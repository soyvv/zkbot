[package]
name = "zk-trade-tools"
version = "0.1.0"
edition = "2021"
description = "Multi-purpose trading stack CLI tools"

[[bin]]
name = "zk-trade-tools"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-nats = "0.37"
bytes = "1"
futures = "0.3"
prost = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tonic = "0.12"

zk-infra-rs = { path = "../zk-infra-rs" }
zk-oms-rs = { path = "../zk-oms-rs" }
zk-oms-svc = { path = "../zk-oms-svc" }
zk-proto-rs = { path = "../zk-proto-rs" }

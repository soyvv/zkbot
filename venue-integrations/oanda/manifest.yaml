venue: oanda
version: 1
capabilities:
  gw:
    language: python
    entrypoint: python:oanda.gw:OandaGatewayAdaptor
    config_schema: schemas/gw_config.schema.json
  rtmd:
    language: python
    entrypoint: python:oanda.rtmd:OandaRtmdAdaptor
    config_schema: schemas/rtmd_config.schema.json
  refdata:
    language: python
    entrypoint: python:oanda.refdata:OandaRefdataLoader
    config_schema: schemas/refdata_config.schema.json
metadata:
  supports_tradfi_sessions: true
  notes:
    - Trading gateway uses hybrid/query-backed mode.
    - RTMD supports tick (pricing stream) and kline (REST candle polling).
    - OrderBook and Funding are not supported (OANDA is FX/CFD).

venue: oanda
schema_id: venue/oanda
version: 2
capabilities:
  gw:
    language: python
    entrypoint: python:oanda.gw:OandaGatewayAdaptor
    config_schema: schemas/gw_config.schema.json
    field_descriptors:
      - path: /secret_ref
        secret_ref: true
        reloadable: false
      - path: /environment
        reloadable: false
      - path: /account_id
        reloadable: false
      - path: /api_base_url
        reloadable: false
      - path: /stream_base_url
        reloadable: false
  rtmd:
    language: python
    entrypoint: python:oanda.rtmd:OandaRtmdAdaptor
    config_schema: schemas/rtmd_config.schema.json
    field_descriptors:
      - path: /secret_ref
        secret_ref: true
        reloadable: false
  refdata:
    language: python
    entrypoint: python:oanda.refdata:OandaRefdataLoader
    config_schema: schemas/refdata_config.schema.json
    field_descriptors:
      - path: /secret_ref
        secret_ref: true
        reloadable: false
      - path: /environment
        reloadable: false
      - path: /account_id
        reloadable: false
      - path: /api_base_url
        reloadable: false
metadata:
  supports_tradfi_sessions: true
  notes:
    - Trading gateway uses hybrid/query-backed mode.
    - RTMD supports tick (pricing stream) and kline (REST candle polling).
    - OrderBook and Funding are not supported (OANDA is FX/CFD).

venue: okx
schema_id: venue/okx
version: 5
capabilities:
  gw:
    language: rust
    entrypoint: rust::okx::gw::OkxGatewayAdaptor
    config_schema: schemas/gw_config.schema.json
    field_descriptors:
      - path: /secret_ref
        secret_ref: true
        reloadable: false
      - path: /api_base_url
        reloadable: false
      - path: /ws_public_url
        reloadable: false
      - path: /ws_private_url
        reloadable: false
  rtmd:
    language: rust
    entrypoint: rust::okx::rtmd::OkxRtmdAdaptor
    config_schema: schemas/rtmd_config.schema.json
    field_descriptors:
      - path: /secret_ref
        secret_ref: true
        reloadable: false
      - path: /demo_mode
        reloadable: false
      - path: /api_base_url
        reloadable: false
      - path: /ws_public_url
        reloadable: false
      - path: /ws_private_url
        reloadable: false
  refdata:
    language: python
    entrypoint: python:okx.refdata:OkxRefdataLoader
    config_schema: schemas/refdata_config.schema.json
metadata:
  supports_tradfi_sessions: false
  requires_exch_account_id: true
  notes:
    - OKX is the preferred native Rust venue for gateway and RTMD adaptors.
    - Gateway requires exch_account_id in top-level provided config for OMS balance/position linkage.

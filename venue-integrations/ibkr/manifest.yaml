venue: ibkr
schema_id: venue/ibkr
version: 2
capabilities:
  gw:
    language: python
    entrypoint: python:ibkr.gw:IbkrGatewayAdaptor
    config_schema: schemas/gw_config.schema.json
    field_descriptors:
      - path: /mode
        reloadable: false
      - path: /host
        reloadable: false
      - path: /port
        reloadable: false
      - path: /client_id
        reloadable: false
      - path: /account_code
        reloadable: false
      - path: /read_only
        reloadable: true
      - path: /max_msg_rate
        reloadable: true
      - path: /reconnect_delay_s
        reloadable: false
      - path: /reconnect_max_delay_s
        reloadable: false
      - path: /next_valid_id_timeout_s
        reloadable: false
  rtmd:
    language: python
    entrypoint: python:ibkr.rtmd:IbkrRtmdAdaptor
    config_schema: schemas/rtmd_config.schema.json
  refdata:
    language: python
    entrypoint: python:ibkr.refdata:IbkrRefdataLoader
    config_schema: schemas/refdata_config.schema.json
metadata:
  supports_tradfi_sessions: true
  notes:
    - Placeholder module only; runtime loading is not implemented yet.
    - IBKR should be treated as a hybrid, session-constrained integration.
